<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto auto;
            padding: 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        p {
            margin-bottom: 1em;
        }
        .code {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1.8em;
            font-weight: bold;
            font-family: "Tahoma";
            color: #333;
            background-color: #dbeafc;
        }
        .footer {
            text-align: center;
            color: #777;
            font-size: 0.8em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>您的验证码</h1>
    <hr>
    <p>亲爱的用户，您正在请求重置密码或验证您的账户，请使用以下验证码完成操作：</p>
    <p class="code">123456</p>
    <p style="text-decoration: underline">此验证码将在30分钟后失效，请尽快使用。</p>
    <p>如果您没有发起任何操作，请忽略此邮件。为保护您的账户安全，请不要向任何人透露此验证码。</p>
    <div class="footer">版权所有 © 2024 壹心Shop. 保留所有权利.</div>
</div>
</body>
</html>
